version: "3.9"

services:
  # ─── Backend API ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - QF_DEBUG=true
      - QF_HOST=0.0.0.0
      - QF_PORT=8000
      - QF_REDIS_URL=redis://redis:6379/0
      - QF_DATABASE_URL=postgresql+asyncpg://quantumflow:quantumflow@db:5432/quantumflow
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ─── Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/api/v1/stream/prices
    depends_on:
      - backend
    restart: unless-stopped

  # ─── PostgreSQL / TimescaleDB ─────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: quantumflow
      POSTGRES_PASSWORD: quantumflow
      POSTGRES_DB: quantumflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantumflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
